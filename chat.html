<!DOCTYPE html>
<html lang="th">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ถามได้เลย · Hello Galaxy</title>
  <link rel="stylesheet" href="style.css" />
  <style>
    body { display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
    .nav { flex-shrink: 0; }
    .chat-page { flex: 1; overflow: hidden; display: flex; flex-direction: column; }

    .chat-header {
      background: linear-gradient(135deg, var(--lavender) 0%, var(--blush) 100%);
      padding: 0.875rem 1.25rem;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      gap: 0.75rem;
      border-bottom: 1px solid var(--blush-mid);
    }
    .chat-avatar {
      width: 40px;
      height: 40px;
      border-radius: 50%;
      background: var(--white);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1.3rem;
      box-shadow: var(--shadow-soft);
      flex-shrink: 0;
    }
    .chat-header-info .name  { font-weight: 600; font-size: 0.95rem; color: var(--text-dark); }
    .chat-header-info .status {
      font-size: 0.78rem;
      color: var(--sage-dark);
      display: flex;
      align-items: center;
      gap: 0.3rem;
    }
    .status-dot {
      width: 7px;
      height: 7px;
      background: var(--sage-dark);
      border-radius: 50%;
      flex-shrink: 0;
    }

    .chat-body {
      flex: 1;
      overflow: hidden;
      display: flex;
      flex-direction: column;
      max-width: 680px;
      margin: 0 auto;
      width: 100%;
      padding: 0 0.75rem;
    }

    .chat-messages-wrap { flex: 1; overflow-y: auto; padding: 1rem 0; }
    .chat-messages-wrap::-webkit-scrollbar { width: 4px; }
    .chat-messages-wrap::-webkit-scrollbar-thumb { background: var(--blush-mid); border-radius: 2px; }

    .msg-row {
      display: flex;
      margin-bottom: 0.875rem;
      gap: 0.5rem;
      align-items: flex-end;
    }
    .msg-row.user  { flex-direction: row-reverse; }
    .msg-row.bot   { flex-direction: row; }

    .msg-avatar {
      width: 30px;
      height: 30px;
      border-radius: 50%;
      flex-shrink: 0;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 1rem;
      background: var(--lavender);
    }
    .msg-row.user .msg-avatar { background: var(--blush); }

    .msg-bubble {
      max-width: 78%;
      padding: 0.75rem 1rem;
      border-radius: 18px;
      font-size: 0.95rem;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg-row.bot  .msg-bubble {
      background: var(--white);
      color: var(--text-dark);
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--blush-mid);
    }
    .msg-row.user .msg-bubble {
      background: var(--rose);
      color: white;
      border-bottom-right-radius: 6px;
    }

    .typing-indicator {
      display: none;
      padding: 0.875rem 0;
    }
    .typing-indicator.visible { display: block; }
    .typing-dots-wrap {
      display: inline-flex;
      gap: 4px;
      align-items: center;
      background: var(--white);
      padding: 0.75rem 1rem;
      border-radius: 18px;
      border-bottom-left-radius: 6px;
      box-shadow: var(--shadow-soft);
      border: 1px solid var(--blush-mid);
    }
    .typing-dots-wrap span {
      width: 7px;
      height: 7px;
      background: var(--rose);
      border-radius: 50%;
      animation: bounce 1.2s ease infinite;
      opacity: 0.7;
    }
    .typing-dots-wrap span:nth-child(2) { animation-delay: 0.2s; }
    .typing-dots-wrap span:nth-child(3) { animation-delay: 0.4s; }

    .quick-suggestions {
      display: flex;
      gap: 0.5rem;
      flex-wrap: wrap;
      padding: 0.5rem 0;
    }
    .sugg-btn {
      padding: 0.4rem 0.875rem;
      border-radius: var(--radius-pill);
      border: 1.5px solid var(--rose);
      background: transparent;
      color: var(--rose-dark);
      font-size: 0.82rem;
      cursor: pointer;
      font-family: var(--font-body);
      transition: all 0.18s ease;
      white-space: nowrap;
    }
    .sugg-btn:hover { background: var(--blush); }

    .chat-input-row {
      display: flex;
      gap: 0.6rem;
      padding: 0.75rem 0 0.875rem;
      border-top: 1px solid var(--blush-mid);
    }
    .chat-textarea {
      flex: 1;
      padding: 0.7rem 1rem;
      border: 2px solid var(--blush-mid);
      border-radius: 22px;
      font-family: var(--font-body);
      font-size: 0.95rem;
      color: var(--text-dark);
      background: var(--cream);
      outline: none;
      resize: none;
      transition: border-color 0.18s ease;
      min-height: 44px;
      max-height: 120px;
      overflow-y: auto;
      line-height: 1.5;
    }
    .chat-textarea:focus { border-color: var(--rose); }
    .chat-textarea::placeholder { color: var(--text-light); }

    .send-btn {
      width: 44px;
      height: 44px;
      border-radius: 50%;
      background: var(--rose);
      border: none;
      color: white;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.18s ease;
      flex-shrink: 0;
      align-self: flex-end;
    }
    .send-btn:hover:not(:disabled) { background: var(--rose-dark); transform: scale(1.06); }
    .send-btn:disabled { background: var(--text-light); cursor: not-allowed; }

    .error-bubble {
      background: #fff0f0;
      border: 1px solid #f0c0c0;
      color: #c04040;
      padding: 0.75rem 1rem;
      border-radius: 14px;
      font-size: 0.88rem;
      margin: 0.5rem 0;
    }
  </style>
</head>
<body>

  <!-- Navigation -->
  <nav class="nav">
    <div class="nav-inner">
      <span class="nav-logo">🌸 Hello Galaxy</span>
      <ul class="nav-links">
        <li><a href="index.html">หน้าหลัก</a></li>
        <li><a href="manual.html">คู่มือ</a></li>
        <li><a href="storage.html">พื้นที่เก็บข้อมูล</a></li>
        <li><a href="chat.html" class="active">ถามได้เลย</a></li>
      </ul>
    </div>
  </nav>

  <div class="chat-page">

    <!-- Chat header -->
    <div class="chat-header">
      <div class="chat-avatar">🤖</div>
      <div class="chat-header-info">
        <div class="name">ผู้ช่วย Galaxy</div>
        <div class="status">
          <span class="status-dot"></span>
          พร้อมตอบคำถามเป็นภาษาไทยเสมอ
        </div>
      </div>
    </div>

    <div class="chat-body">
      <div class="chat-messages-wrap" id="messagesWrap">

        <!-- Welcome message -->
        <div class="msg-row bot">
          <div class="msg-avatar">🤖</div>
          <div class="msg-bubble">
            สวัสดีมด! 👋 ถามอะไรเกี่ยวกับ Galaxy S26 Ultra ได้เลยนะ ไม่ว่าจะเป็นวิธีถ่ายรูป, ตั้งค่า, Wi-Fi, หรืออะไรก็ตาม — ตอบเป็นภาษาไทยทั้งหมดเลย 🌸
          </div>
        </div>

        <!-- Quick suggestions -->
        <div class="quick-suggestions" id="suggestions">
          <button class="sugg-btn" onclick="sendSuggestion(this)">ถ่ายรูปสวยยังไง?</button>
          <button class="sugg-btn" onclick="sendSuggestion(this)">Wi-Fi เชื่อมต่อไม่ได้</button>
          <button class="sugg-btn" onclick="sendSuggestion(this)">ทำไมแบตหมดเร็ว?</button>
          <button class="sugg-btn" onclick="sendSuggestion(this)">รูปหายไปไหน?</button>
          <button class="sugg-btn" onclick="sendSuggestion(this)">ปิดเสียงยังไง?</button>
        </div>

        <!-- Typing indicator -->
        <div class="typing-indicator" id="typingIndicator">
          <div style="display:flex; gap:0.5rem; align-items:flex-end;">
            <div class="msg-avatar">🤖</div>
            <div class="typing-dots-wrap">
              <span></span><span></span><span></span>
            </div>
          </div>
        </div>

      </div>

      <!-- Input -->
      <div class="chat-input-row">
        <textarea
          class="chat-textarea"
          id="chatInput"
          placeholder="ถามอะไรก็ได้เป็นภาษาไทย…"
          rows="1"
        ></textarea>
        <button class="send-btn" id="sendBtn" onclick="sendMessage()" disabled>
          <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
            <line x1="22" y1="2" x2="11" y2="13"/>
            <polygon points="22 2 15 22 11 13 2 9 22 2"/>
          </svg>
        </button>
      </div>
    </div>
  </div>

<script>
const input    = document.getElementById('chatInput');
const sendBtn  = document.getElementById('sendBtn');
const wrap     = document.getElementById('messagesWrap');
const typing   = document.getElementById('typingIndicator');
const suggsEl  = document.getElementById('suggestions');

// Message history for multi-turn
const history = [];

// Enable/disable send button
input.addEventListener('input', () => {
  sendBtn.disabled = input.value.trim() === '';
  // Auto resize
  input.style.height = 'auto';
  input.style.height = Math.min(input.scrollHeight, 120) + 'px';
});

// Enter to send (Shift+Enter for newline)
input.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    if (!sendBtn.disabled) sendMessage();
  }
});

function sendSuggestion(btn) {
  input.value = btn.textContent;
  input.dispatchEvent(new Event('input'));
  suggsEl.style.display = 'none';
  sendMessage();
}

function appendMessage(role, text) {
  // Remove typing indicator temporarily
  const isBot = role === 'bot';
  const row = document.createElement('div');
  row.className = `msg-row ${role}`;
  row.innerHTML = `
    <div class="msg-avatar">${isBot ? '🤖' : '😊'}</div>
    <div class="msg-bubble">${escapeHtml(text)}</div>
  `;
  // Insert before typing indicator
  wrap.insertBefore(row, typing);
  scrollToBottom();
}

function appendError(msg) {
  const el = document.createElement('div');
  el.className = 'error-bubble';
  el.textContent = msg;
  wrap.insertBefore(el, typing);
  scrollToBottom();
}

function scrollToBottom() {
  wrap.scrollTop = wrap.scrollHeight;
}

function escapeHtml(t) {
  return t
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;')
    .replace(/\n/g, '<br>');
}

async function sendMessage() {
  const text = input.value.trim();
  if (!text) return;

  // Reset input
  input.value = '';
  input.style.height = 'auto';
  sendBtn.disabled = true;
  suggsEl.style.display = 'none';

  // Show user message
  appendMessage('user', text);

  // Add to history
  history.push({ role: 'user', content: text });

  // Show typing
  typing.classList.add('visible');
  scrollToBottom();

  try {
    const response = await fetch('/.netlify/functions/chat', {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({ messages: history })
    });

    typing.classList.remove('visible');

    if (!response.ok) {
      const err = await response.json().catch(() => ({}));
      appendError('เกิดข้อผิดพลาด: ' + (err.error || response.status) + ' — ลองใหม่อีกครั้งนะ');
      history.pop(); // remove failed message
      return;
    }

    const data = await response.json();
    const reply = data.content || data.reply || '';

    appendMessage('bot', reply);
    history.push({ role: 'assistant', content: reply });

  } catch (err) {
    typing.classList.remove('visible');
    appendError('ไม่สามารถเชื่อมต่อได้ตอนนี้ — ตรวจสอบ internet แล้วลองใหม่อีกครั้งนะ 🌿');
    history.pop();
  }
}

scrollToBottom();
</script>
</body>
</html>
