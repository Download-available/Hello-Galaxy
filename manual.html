// ======================================================
// Render & Filter Logic
// ======================================================
const container = document.getElementById('cardsContainer');
const noResults  = document.getElementById('noResults');
const searchInput = document.getElementById('searchInput');
const filterButtons = document.querySelectorAll('.filter-tab');

let currentCat = 'all';
let currentSearch = '';

function renderCards() {
  const q = currentSearch.toLowerCase().trim();
  let filtered = cards.filter(c => {
    const catMatch = currentCat === 'all' || c.cat === currentCat;
    const searchMatch = !q ||
      c.title.toLowerCase().includes(q) ||
      (c.subtitle||'').toLowerCase().includes(q) ||
      (c.keywords||'').toLowerCase().includes(q) ||
      (c.body||'').toLowerCase().includes(q);
    return catMatch && searchMatch;
  });

  container.innerHTML = '';

  if (filtered.length === 0) {
    noResults.classList.remove('hidden');
    return;
  }
  noResults.classList.add('hidden');

  // Group by category if showing all
  if (currentCat === 'all' && !q) {
    const groups = {
      basics:   { label: '🌱 เริ่มต้นใช้งาน', cards: [] },
      camera:   { label: '📷 กล้องและรูปภาพ', cards: [] },
      calls:    { label: '📞 โทรและเชื่อมต่อ', cards: [] },
      settings: { label: '⚙️ การตั้งค่า', cards: [] },
      security: { label: '🔒 ความปลอดภัย', cards: [] },
      tips:     { label: '✨ เคล็ดลับและลัด', cards: [] },
    };
    filtered.forEach(c => { if (groups[c.cat]) groups[c.cat].cards.push(c); });

    Object.values(groups).forEach(g => {
      if (!g.cards.length) return;
      const groupEl = document.createElement('div');
      groupEl.className = 'category-group';
      groupEl.innerHTML = `<div class="category-label">${g.label}</div>`;
      g.cards.forEach(c => groupEl.appendChild(makeCard(c)));
      container.appendChild(groupEl);
    });
  } else {
    filtered.forEach(c => container.appendChild(makeCard(c)));
  }
}

function makeCard(c) {
  const div = document.createElement('div');
  div.className = 'manual-card';
  div.id = c.id;
  div.innerHTML = `
    <div class="manual-card-header" onclick="toggleCard(this)">
      <span class="manual-card-icon">${c.icon}</span>
      <div class="manual-card-title">
        <h3>${c.title}</h3>
        <span class="subtitle">${c.subtitle || ''}</span>
      </div>
      <svg class="manual-card-chevron" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
    <div class="manual-card-body">
      ${c.body}
      ${c.iphone ? `<div class="iphone-note">📱 <strong>มาจาก iPhone?</strong> ${c.iphone}</div>` : ''}
    </div>`;
  return div;
}

function toggleCard(header) {
  const card = header.closest('.manual-card');
  const wasOpen = card.classList.contains('open');
  // Close all
  document.querySelectorAll('.manual-card.open').forEach(c => c.classList.remove('open'));
  if (!wasOpen) card.classList.add('open');
}

filterButtons.forEach(btn => {
  btn.addEventListener('click', () => {
    filterButtons.forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCat = btn.dataset.cat;
    renderCards();
  });
});

searchInput.addEventListener('input', () => {
  currentSearch = searchInput.value;
  renderCards();
});

// Initial render
renderCards();

// Deep link: open card if URL hash matches
if (location.hash) {
  const id = location.hash.slice(1);
  setTimeout(() => {
    const el = document.getElementById(id);
    if (el) {
      el.scrollIntoView({ behavior: 'smooth', block: 'center' });
      const header = el.querySelector('.manual-card-header');
      if (header) toggleCard(header);
    }
  }, 300);
}
</script>
